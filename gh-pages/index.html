<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CO2</title>
    <link rel="stylesheet" href="style.css">

    <!-- Open Graph metadata -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hkalbasi.github.io/co2/">
    <meta property="og:title" content="CO2">
    <meta property="og:description" content="C with Rust powers - A programming language backward compatible with C, with direct access to Rust ecosystem">
    <meta property="og:site_name" content="CO2">
</head>
<body>
    <h1 class="title">CO2</h1>
    <p class="motto">C with Rust powers</p>

    <div class="install-section">
        <div class="install-label">Install with:</div>
        <div class="install-command">
            <code>curl -sSf https://hkalbasi.github.io/co2/install.sh | sh</code>
            <button class="copy-btn" onclick="copyInstall()">Copy</button>
        </div>
    </div>

    <div class="links">
        <a href="https://github.com/hkalbasi/co2" class="link">Github</a>
        <a href="https://github.com/hkalbasi/co2/tree/main/docs" class="link">Documentation</a>
    </div>

    <script>
        function copyInstall() {
            const cmd = document.querySelector('.install-command code').textContent;
            navigator.clipboard.writeText(cmd).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 2000);
            }).catch(() => {
                // Fallback for non-HTTPS or older browsers
                alert('Copy this command: ' + cmd);
            });
        }
    </script>
</body>
</html>
